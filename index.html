<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBS Production Multi-Splitter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-6">
    
    <div class="max-w-3xl w-full glass p-8 rounded-3xl shadow-2xl">
        <div class="flex justify-between items-start mb-6">
            <div class="text-left">
                <h1 class="text-3xl font-extrabold bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">
                    DBS Batch Processor
                </h1>
                <p class="text-slate-400 font-light tracking-wide uppercase text-xs">Rounding & Rips Optimization</p>
            </div>
            <button id="clearAllBtn" class="text-xs bg-slate-700/50 hover:bg-red-900/40 text-slate-400 hover:text-red-400 px-4 py-2 rounded-lg transition-all border border-white/5">
                Clear All
            </button>
        </div>

        <div class="border-2 border-dashed border-slate-700 rounded-2xl p-10 text-center hover:border-blue-500 transition-colors cursor-pointer relative mb-6">
            <input type="file" id="csvFiles" accept=".csv" multiple class="absolute inset-0 opacity-0 cursor-pointer">
            <div class="text-slate-400">
                <p class="text-lg font-medium text-slate-300">Drop Allmoxy Reports Here</p>
                <p class="text-sm">Rips and Linear Ft will be rounded up automatically</p>
            </div>
        </div>

        <div id="fileQueue" class="space-y-2 mb-8 max-h-60 overflow-y-auto pr-2 hidden"></div>

        <button id="processBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-blue-900/20 opacity-50 cursor-not-allowed" disabled>
            Process & Generate ZIP
        </button>
    </div>

    <script>
        let selectedFiles = [];
        const fileInput = document.getElementById('csvFiles');
        const fileQueue = document.getElementById('fileQueue');
        const processBtn = document.getElementById('processBtn');
        const clearAllBtn = document.getElementById('clearAllBtn');

        fileInput.addEventListener('change', (e) => {
            selectedFiles = [...selectedFiles, ...Array.from(e.target.files)];
            updateUI();
            fileInput.value = '';
        });

        clearAllBtn.addEventListener('click', () => {
            selectedFiles = [];
            updateUI();
        });

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateUI();
        }

        function updateUI() {
            if (selectedFiles.length > 0) {
                fileQueue.classList.remove('hidden');
                processBtn.disabled = false;
                processBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                fileQueue.innerHTML = selectedFiles.map((file, index) => `
                    <div class="flex justify-between items-center bg-slate-800/50 p-3 rounded-xl border border-white/5">
                        <div class="flex items-center space-x-3">
                            <span class="text-blue-400 text-xs font-mono">[CSV]</span>
                            <span class="text-sm font-medium text-slate-300 truncate max-w-xs">${file.name}</span>
                        </div>
                        <button onclick="removeFile(${index})" class="text-slate-500 hover:text-red-400 p-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
                        </button>
                    </div>
                `).join('');
            } else {
                fileQueue.classList.add('hidden');
                processBtn.disabled = true;
                processBtn.classList.add('opacity-50', 'cursor-not-allowed');
            }
        }

        processBtn.addEventListener('click', async () => {
            const zip = new JSZip();
            const categories = { "FAA": {}, "Ply": {}, "PB": {}, "MDF": {}, "Solid": {} };

            for (const file of selectedFiles) {
                const data = await new Promise(resolve => {
                    Papa.parse(file, {
                        header: true,
                        skipEmptyLines: true,
                        transformHeader: h => h.replace(/[^\x20-\x7E]/g, '').trim(),
                        complete: r => resolve(r.data)
                    });
                });
                
                data.forEach(row => {
                    const findValue = (obj, targets) => {
                        const key = Object.keys(obj).find(k => targets.includes(k.toUpperCase().trim()));
                        return obj[key];
                    };

                    const rawMaterial = (findValue(row, ['MATERIAL']) || "").trim();
                    const heightValue = findValue(row, ['HEIGHT']);
                    const qtyValue = findValue(row, ['PARTS', 'QTY', 'QUANTITY']);
                    const lfValue = findValue(row, ['LF', 'LINEAR FEET']);
                    const ripsValue = findValue(row, ['RIPS']);

                    const height = parseFloat(heightValue);
                    const qty = parseInt(qtyValue);
                    const linearFt = parseFloat(lfValue) || 0;
                    const rips = parseFloat(ripsValue) || 0;

                    if (!rawMaterial || isNaN(height)) return;

                    const roundedHeight = Math.ceil(height * 2) / 2;
                    const matLower = rawMaterial.toLowerCase();
                    let cat = "Solid", ripLength = 0;

                    if (matLower.includes("faa")) cat = "FAA";
                    else if (matLower.includes("ply")) { cat = "Ply"; ripLength = rawMaterial.includes("(60)") ? 60 : 96; }
                    else if (matLower.includes("pb")) { cat = "PB"; ripLength = 96; }
                    else if (matLower.includes("mdf")) { cat = "MDF"; ripLength = 96; }

                    const groupKey = `${rawMaterial}_${roundedHeight}`;
                    if (!categories[cat][groupKey]) {
                        categories[cat][groupKey] = { "Material": rawMaterial, "Height": roundedHeight, "Pieces": 0, "Total LF": 0, "Total Rips": 0, "Rip": ripLength };
                    }
                    
                    categories[cat][groupKey]["Pieces"] += qty;
                    categories[cat][groupKey]["Total LF"] += linearFt;
                    categories[cat][groupKey]["Total Rips"] += rips;
                });
            }

            for (const [name, groups] of Object.entries(categories)) {
                const items = Object.values(groups);
                if (items.length > 0) {
                    items.sort((a, b) => a.Material.localeCompare(b.Material) || a.Height - b.Height);
                    const finalData = items.map(i => {
                        const output = { 
                            "Material": i.Material, 
                            "Production Height": i.Height, 
                            "Total Linear Ft": Math.ceil(i["Total LF"]) // Always round up LF
                        };
                        
                        if (name === "Ply" || name === "PB" || name === "MDF") {
                            output["Total Rips"] = Math.ceil(i["Total Rips"]); // Round up Rips for sheet goods
                            output["Rip Size"] = i.Rip;
                        } else {
                            output["Total Pieces"] = i.Pieces; // Solids/FAA use standard parts count
                        }
                        return output;
                    });
                    zip.file(`DBS_${name}_Report.csv`, Papa.unparse(finalData));
                }
            }

            const blob = await zip.generateAsync({type:"blob"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `DBS_Batch_${new Date().toISOString().split('T')[0]}.zip`;
            a.click();
        });
    </script>
</body>
</html>
