<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBS Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .card-hover:hover {
            transform: translateY(-5px);
            border-color: #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen">
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-blue-900/20 blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-indigo-900/20 blur-[120px]"></div>
    </div>

    <div class="max-w-5xl mx-auto px-6 py-16">
        <header class="flex flex-col md:flex-row md:items-end justify-between mb-12 gap-6">
            <div>
                <h1 class="text-5xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">
                    Operations Hub
                </h1>
                <p class="text-slate-400 mt-3 text-lg font-light tracking-wide uppercase text-xs">Drawer Box Specialties • Internal Apps</p>
            </div>
            <div class="relative group">
                <input type="text" id="search" placeholder="Search tools..." 
                    class="glass w-72 px-5 py-3 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all text-sm">
            </div>
        </header>

        <div id="app-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full py-20 text-center animate-pulse text-slate-500">Scanning production network...</div>
        </div>
    </div>

    <script>
        async function loadApps() {
            const username = 'drawerboxspecialties-ops'; 
            const grid = document.getElementById('app-grid');
            
            try {
                const response = await fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=100`);
                const repos = await response.json();
                const apps = repos.filter(repo => repo.has_pages && repo.name !== 'ops-dashboard');

                if (apps.length === 0) {
                    grid.innerHTML = '<p class="text-slate-400">No active apps found.</p>';
                    return;
                }

                grid.innerHTML = apps.map(app => `
                    <a href="https://${username}.github.io/${app.name}/" target="_blank" 
                       class="glass card-hover block p-8 rounded-3xl transition-all duration-300 group">
                        <div class="flex items-center justify-between mb-4">
                            <div class="p-3 bg-blue-500/10 rounded-2xl group-hover:bg-blue-500/20 transition-colors">
                                <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                </svg>
                            </div>
                            <span class="text-[10px] font-bold text-blue-400/50 uppercase tracking-widest">Active</span>
                        </div>
                        <h2 class="text-xl font-bold text-white mb-2 group-hover:text-blue-400 transition-colors capitalize">
                            ${app.name.replace(/-/g, ' ')}
                        </h2>
                        <p class="text-slate-400 text-sm leading-relaxed">
                            ${app.description || 'Custom production workflow tool.'}
                        </p>
                    </a>
                `).join('');

            } catch (error) {
                grid.innerHTML = '<p class="text-red-400">Error connecting to GitHub.</p>';
            }
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('#app-grid > a');
            cards.forEach(card => {
                const text = card.innerText.toLowerCase();
                card.style.display = text.includes(term) ? 'block' : 'none';
            });
        });

        loadApps();
    </script>
</body>
</html>
